# =============================================================================
# WireGuard VPN — Custom systemd Service Override
# =============================================================================
# File location: /etc/systemd/system/wg-quick@wg0.service.d/override.conf
#
# This is a "drop-in" override for the wg-quick@.service unit.
# It adds:
#   - Automatic restart on failure
#   - Restart delay and maximum restarts
#   - Resource limits for security
#   - Logging configuration
#
# HOW TO INSTALL:
#   mkdir -p /etc/systemd/system/wg-quick@wg0.service.d/
#   cp override.conf /etc/systemd/system/wg-quick@wg0.service.d/
#   systemctl daemon-reload
#   systemctl restart wg-quick@wg0
# =============================================================================

[Service]
# ── Restart behavior ──────────────────────────────────────────────────────────
# Restart the service if it exits for any reason (except manual stop)
Restart=on-failure

# Wait 5 seconds before restarting (prevents rapid crash loops)
RestartSec=5s

# Maximum number of restarts in 10 minutes (prevents infinite loops)
# StartLimitBurst=5 means: allow up to 5 restarts within StartLimitIntervalSec
StartLimitBurst=5
StartLimitIntervalSec=600

# ── Resource limits ───────────────────────────────────────────────────────────
# LimitNOFILE: Maximum open file descriptors
# High value needed for many simultaneous VPN connections
LimitNOFILE=1048576

# ── Security settings ─────────────────────────────────────────────────────────
# Prevent the service from gaining new privileges
NoNewPrivileges=yes

# ── Logging ───────────────────────────────────────────────────────────────────
# Log output to the systemd journal
StandardOutput=journal
StandardError=journal

# Tag log entries with this identifier for easy filtering
SyslogIdentifier=wireguard

[Unit]
# ── Boot ordering ─────────────────────────────────────────────────────────────
# Start WireGuard AFTER the network is available
After=network-online.target
Wants=network-online.target

# ── Description ──────────────────────────────────────────────────────────────
Description=WireGuard VPN — %i interface
